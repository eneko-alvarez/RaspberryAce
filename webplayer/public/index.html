<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AceStream TV</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c27;
      --accent: #5b5ef4;
      --accent2: #7c3aed;
      --text: #f0f0f8;
      --text2: #8888aa;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

    /* ── Header ── */
    header { background: var(--surface); padding: 14px 20px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #ffffff0f; }
    header h1 { font-size: 18px; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; white-space: nowrap; }
    #mode-tabs { display: flex; gap: 4px; padding: 3px; border-radius: 9px; background: #ffffff0a; border: 1px solid #ffffff0d; }
    .mode-tab { border: none; border-radius: 7px; background: transparent; color: var(--text2); padding: 7px 11px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; }
    .mode-tab.active { background: var(--accent); color: #fff; }
    #search-wrap { flex: 1; max-width: 560px; display: flex; gap: 8px; min-width: 180px; }
    #search { flex: 1; min-width: 0; background: var(--surface2); border: 1px solid #ffffff12; border-radius: 8px; padding: 8px 14px; color: var(--text); font-size: 14px; outline: none; transition: border-color .2s; }
    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--text2); }
    #custom-btn { background: var(--accent); border: none; color: white; border-radius: 8px; padding: 0 12px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
    #custom-btn:hover { filter: brightness(1.08); }
    #custom-btn:disabled { opacity: .6; cursor: wait; }
    #channel-count { font-size: 12px; color: var(--text2); white-space: nowrap; margin-left: auto; }

    /* ── Layout ── */
    #app { display: flex; height: calc(100vh - 57px); }

    /* ── Sidebar ── */
    #sidebar { width: 260px; min-width: 260px; overflow-y: auto; background: var(--surface); border-right: 1px solid #ffffff08; display: flex; flex-direction: column; }
    #group-list { list-style: none; padding: 8px 0; }
    #group-list li { padding: 10px 18px; cursor: pointer; font-size: 13px; color: var(--text2); border-left: 3px solid transparent; transition: all .15s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #group-list li:hover { color: var(--text); background: var(--surface2); }
    #group-list li.active { color: var(--text); border-left-color: var(--accent); background: var(--surface2); }
    #group-list li.back { color: var(--text); font-weight: 700; }
    #group-list li.section-label { cursor: default; padding: 14px 18px 6px; font-size: 11px; font-weight: 800; color: #5f5f82; text-transform: uppercase; letter-spacing: 1px; border-left-color: transparent; }
    #group-list li.section-label:hover { background: transparent; color: #5f5f82; }
    #group-list li.subgroup { padding-left: 30px; }

    /* ── Main ── */
    #main { flex: 1; overflow-y: auto; padding: 24px; }

    /* ── Player overlay ── */
    #player-overlay { display: none; position: fixed; inset: 0; background: #000000ee; z-index: 200; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    #player-overlay.open { display: flex; }
    #player-wrap { width: 100%; max-width: 900px; }
    #player-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    #player-logo { width: 40px; height: 40px; object-fit: contain; border-radius: 6px; background: var(--surface2); }
    #player-title { font-size: 16px; font-weight: 600; flex: 1; }
    #player-status { font-size: 12px; color: var(--text2); }
    #close-btn { background: var(--surface2); border: none; color: var(--text); width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
    #close-btn:hover { background: #e50914; }
    #player-shell { position: relative; background: #000; border-radius: var(--radius); overflow: hidden; }
    video { width: 100%; aspect-ratio: 16/9; background: #000; display: block; }
    #stream-loader { position: absolute; inset: 0; z-index: 2; display: flex; align-items: center; justify-content: center; padding: 24px; background: #000000d9; }
    .stream-loader-inner { display: flex; align-items: center; gap: 14px; padding: 14px 18px; border-radius: 999px; background: #00000066; }
    .stream-spinner { width: 34px; height: 34px; border: 3px solid #ffffff24; border-top-color: #e50914; border-radius: 50%; animation: spin .75s linear infinite; }
    #loader-percent { min-width: 54px; font-size: 24px; font-weight: 800; color: var(--text); text-align: left; }
    #stream-error { position: absolute; inset: 0; z-index: 2; display: flex; align-items: center; justify-content: center; padding: 24px; background: #000000d9; text-align: center; }
    .stream-error-inner { max-width: 360px; padding: 18px 20px; border-radius: 10px; background: #16090bcc; border: 1px solid #e5091455; }
    .stream-error-title { font-size: 16px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
    #stream-error-msg { font-size: 12px; line-height: 1.4; color: var(--text2); }
    #live-controls { position: absolute; left: 0; right: 0; bottom: 0; min-height: 58px; padding: 12px 14px; display: flex; align-items: center; gap: 10px; background: linear-gradient(180deg, transparent, #000000d9); opacity: 1; transition: opacity .25s ease; }
    #player-shell.controls-hidden #live-controls { opacity: 0; pointer-events: none; }
    .live-badge { display: inline-flex; align-items: center; gap: 7px; height: 32px; padding: 0 10px; border-radius: 999px; background: #e509141f; color: #fff; border: 1px solid #e5091466; font-size: 11px; font-weight: 800; letter-spacing: .7px; white-space: nowrap; }
    .live-dot { width: 8px; height: 8px; border-radius: 50%; background: #e50914; box-shadow: 0 0 0 4px #e5091428; }
    [hidden] { display: none !important; }
    .player-spacer { flex: 1; }
    .player-btn { height: 36px; min-width: 36px; border: none; border-radius: 8px; background: transparent; color: var(--text); cursor: pointer; font-size: 17px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 0 9px; text-shadow: 0 1px 2px #000; }
    .player-btn:hover { background: #ffffff18; }
    .player-btn.text-btn { font-size: 12px; letter-spacing: .7px; text-transform: uppercase; color: #fff; background: #e50914cc; padding: 0 11px; }
    .player-btn.text-btn:hover { background: #f6121d; }

    /* ── Group title ── */
    .group-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); margin: 0 0 14px; padding-bottom: 8px; border-bottom: 1px solid #ffffff0a; }

    /* ── Channel grid ── */
    .channel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-bottom: 32px; }
    .channel-card { background: var(--surface); border: 1px solid #ffffff08; border-radius: var(--radius); padding: 16px 12px; cursor: pointer; transition: all .2s; display: flex; flex-direction: column; align-items: center; gap: 10px; text-align: center; position: relative; min-height: 128px; }
    .channel-card:hover { background: var(--surface2); border-color: var(--accent); transform: translateY(-2px); }
    .channel-card:active { transform: translateY(0); }
    .favorite-btn { position: absolute; top: 7px; right: 7px; width: 28px; height: 28px; border: 1px solid #ffffff12; border-radius: 50%; background: #00000040; color: #9a9ab8; cursor: pointer; font-size: 16px; line-height: 1; display: flex; align-items: center; justify-content: center; transition: all .15s; }
    .favorite-btn:hover { color: var(--text); background: #00000070; border-color: #ffffff28; }
    .favorite-btn.active { color: #ff3b5f; border-color: #ff3b5f55; background: #ff3b5f18; }
    .ch-logo { width: 56px; height: 56px; object-fit: contain; border-radius: 8px; }
    .ch-logo-placeholder { width: 56px; height: 56px; border-radius: 8px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 22px; }
    .ch-name { font-size: 11px; color: var(--text2); line-height: 1.3; word-break: break-word; }

    /* ── VOD ── */
    body.vod-mode #sidebar { display: none; }
    body.vod-mode #main { padding: 0; }
    body.vod-mode #custom-btn { display: none; }
    #vod-content { display: none; }
    body.vod-mode #vod-content { display: block; }
    body.vod-mode #content, body.vod-mode #loading-state, body.vod-mode #error-state { display: none !important; }
    #vod-loading, #vod-error { padding: 64px 24px; color: var(--text2); text-align: center; }
    #vod-home { padding-bottom: 28px; }
    .vod-hero { min-height: 410px; display: flex; align-items: flex-end; padding: 72px 32px 32px; background-size: cover; background-position: center; position: relative; }
    .vod-hero::before { content: ""; position: absolute; inset: 0; background: linear-gradient(90deg, #0a0a0fee 0%, #0a0a0f9e 42%, #0a0a0f20 100%), linear-gradient(180deg, #0a0a0f44 0%, #0a0a0f 100%); }
    .vod-hero-inner { position: relative; z-index: 1; max-width: 680px; }
    .vod-kicker { font-size: 12px; font-weight: 800; letter-spacing: 1.2px; color: #ffb35c; text-transform: uppercase; margin-bottom: 10px; }
    .vod-hero h2 { font-size: clamp(32px, 6vw, 64px); line-height: .95; margin-bottom: 14px; letter-spacing: 0; }
    .vod-meta { display: flex; gap: 12px; flex-wrap: wrap; color: #d7d7e8; font-size: 13px; font-weight: 700; margin-bottom: 14px; }
    .vod-overview { color: #d4d4e2; line-height: 1.45; max-width: 620px; margin-bottom: 18px; }
    .vod-action { border: none; border-radius: 8px; background: #fff; color: #101014; height: 40px; padding: 0 16px; font-weight: 800; cursor: pointer; }
    .vod-action.secondary { background: #ffffff24; color: #fff; margin-left: 8px; }
    .vod-section { padding: 18px 24px 6px; }
    .vod-section h3 { font-size: 18px; margin: 0 0 10px; }
    .vod-row { display: grid; grid-auto-flow: column; grid-auto-columns: minmax(148px, 180px); gap: 12px; overflow-x: auto; padding-bottom: 12px; }
    .vod-card { border: 1px solid #ffffff0d; border-radius: 8px; background: var(--surface); overflow: hidden; cursor: pointer; text-align: left; transition: transform .2s, border-color .2s, background .2s; min-height: 310px; }
    .vod-card:hover { transform: translateY(-2px); border-color: #ffb35c88; background: var(--surface2); }
    .vod-poster { width: 100%; aspect-ratio: 2 / 3; object-fit: cover; background: #20202c; display: block; }
    .vod-poster-fallback { width: 100%; aspect-ratio: 2 / 3; background: #20202c; display: flex; align-items: center; justify-content: center; color: var(--text2); font-size: 12px; padding: 10px; text-align: center; }
    .vod-card-body { padding: 9px; }
    .vod-title { font-size: 12px; font-weight: 800; color: var(--text); line-height: 1.25; min-height: 31px; }
    .vod-card-meta { color: var(--text2); font-size: 11px; margin-top: 6px; display: flex; justify-content: space-between; gap: 6px; }
    .vod-detail { position: fixed; inset: 0; z-index: 180; background: #050507f5; overflow-y: auto; display: none; }
    .vod-detail.open { display: block; }
    .vod-detail-hero { min-height: 390px; background-size: cover; background-position: center; position: relative; display: flex; align-items: flex-end; padding: 72px 28px 28px; }
    .vod-detail-hero::before { content: ""; position: absolute; inset: 0; background: linear-gradient(90deg, #050507f5 0%, #050507c9 52%, #05050733 100%), linear-gradient(180deg, transparent 0%, #050507 100%); }
    .vod-detail-body { position: relative; z-index: 1; max-width: 760px; }
    .vod-detail-body h2 { font-size: clamp(30px, 5vw, 56px); line-height: 1; margin-bottom: 12px; }
    .vod-detail-close { position: fixed; top: 14px; right: 16px; z-index: 181; width: 38px; height: 38px; border: none; border-radius: 50%; background: #ffffff1a; color: #fff; font-size: 18px; cursor: pointer; }
    .vod-trailer-list { padding: 18px 28px 28px; }
    .vod-trailer-list h3 { margin-bottom: 12px; }
    .vod-video-btn { margin: 0 8px 8px 0; border: 1px solid #ffffff1f; border-radius: 8px; background: #ffffff12; color: #fff; padding: 10px 12px; cursor: pointer; }
    .vod-provider-note { color: var(--text2); font-size: 13px; line-height: 1.4; margin-bottom: 12px; }
    .vod-episode-tools { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0 12px; align-items: center; }
    .vod-select { min-width: 150px; height: 38px; border: 1px solid #ffffff18; border-radius: 8px; background: var(--surface2); color: var(--text); padding: 0 10px; }
    .vod-small-action { height: 38px; border: none; border-radius: 8px; background: #ffffff; color: #101014; padding: 0 12px; font-weight: 800; cursor: pointer; }
    #vod-frame { width: 100%; aspect-ratio: 16/9; border: 0; display: none; background: #000; }
    #player-shell.vod-player video, #player-shell.vod-player #stream-loader, #player-shell.vod-player #stream-error, #player-shell.vod-player #live-controls { display: none !important; }
    #player-shell.vod-player #vod-frame { display: block; }
    .tmdb-credit { color: var(--text2); font-size: 11px; padding: 8px 24px 20px; }

    /* ── States ── */
    #loading-state, #error-state { padding: 60px 20px; text-align: center; color: var(--text2); }
    .spinner { width: 36px; height: 36px; border: 3px solid #ffffff15; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      header { flex-wrap: wrap; }
      #app { height: calc(100vh - 101px); }
      #sidebar { display: none; }
      #sidebar.open { display: flex; position: fixed; inset: 101px 0 0 0; z-index: 150; width: 100%; }
      #menu-btn { display: flex; }
      #main { padding: 16px; }
      header { gap: 10px; }
      header h1 { font-size: 16px; }
      #search-wrap { max-width: none; }
      #custom-btn { padding: 0 10px; font-size: 12px; }
      #mode-tabs { order: 3; width: 100%; }
      .mode-tab { flex: 1; }
      .channel-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
      .vod-hero, .vod-detail-hero { min-height: 360px; padding: 56px 18px 24px; }
      .vod-section { padding: 16px 14px 4px; }
      .vod-row { grid-auto-columns: minmax(132px, 148px); }
      #player-overlay { padding: 10px; }
      #live-controls { gap: 7px; padding: 10px; flex-wrap: wrap; }
      .live-badge { font-size: 10px; padding: 0 8px; }
      .player-btn { min-width: 34px; padding: 0 8px; }
      .player-spacer { display: none; }
    }
    @media (min-width: 641px) { #menu-btn { display: none; } }
    #menu-btn { background: var(--surface2); border: none; color: var(--text); padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 18px; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #ffffff20; border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <button id="menu-btn" onclick="toggleSidebar()">☰</button>
  <h1>📡 AceStream TV</h1>
  <nav id="mode-tabs" aria-label="Secciones">
    <button id="live-tab" class="mode-tab active" type="button" onclick="setAppMode('live')">Directos</button>
    <button id="vod-tab" class="mode-tab" type="button" onclick="setAppMode('vod')">VOD</button>
  </nav>
  <div id="search-wrap">
    <input id="search" type="search" placeholder="Buscar canal o pegar AceStream ID…" oninput="onSearch(this.value)" onkeydown="onSearchKeydown(event)">
    <button id="custom-btn" onclick="loadCustomChannel()">Cargar</button>
  </div>
  <span id="channel-count"></span>
</header>

<div id="app">
  <div id="sidebar">
    <ul id="group-list"></ul>
  </div>
  <div id="main">
    <div id="loading-state"><div class="spinner"></div>Cargando canales…</div>
    <div id="error-state" style="display:none">❌ Error cargando canales.<br><small id="error-msg"></small></div>
    <div id="content" style="display:none"></div>
    <div id="vod-content">
      <div id="vod-loading"><div class="spinner"></div>Cargando VOD…</div>
      <div id="vod-error" style="display:none">No se pudo cargar VOD.<br><small id="vod-error-msg"></small></div>
      <div id="vod-home" style="display:none"></div>
    </div>
  </div>
</div>

<!-- Player overlay -->
<div id="player-overlay">
  <div id="player-wrap">
    <div id="player-header">
      <img id="player-logo" src="" alt="" onerror="this.style.display='none'">
      <div id="player-title"></div>
      <div id="player-status"></div>
      <button id="close-btn" onclick="closePlayer()">✕</button>
    </div>
    <div id="player-shell">
      <video id="video" autoplay playsinline></video>
      <iframe id="vod-frame" title="Trailer VOD" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>
      <div id="stream-loader" hidden>
        <div class="stream-loader-inner">
          <div class="stream-spinner"></div>
          <div id="loader-percent">0%</div>
        </div>
      </div>
      <div id="stream-error" hidden>
        <div class="stream-error-inner">
          <div class="stream-error-title">No se pudo cargar el directo</div>
          <div id="stream-error-msg">Prueba de nuevo en unos segundos.</div>
        </div>
      </div>
      <div id="live-controls">
        <div id="live-badge" class="live-badge"><span class="live-dot"></span><span id="live-label">EN DIRECTO</span></div>
        <button class="player-btn" type="button" onclick="seekBack10()" aria-label="Retroceder 10 segundos">↶ 10s</button>
        <button id="go-live-btn" class="player-btn text-btn" type="button" onclick="goLive()" aria-label="Volver al directo" hidden>Directo</button>
        <div class="player-spacer"></div>
        <button id="mute-btn" class="player-btn" type="button" onclick="toggleMute()" aria-label="Silenciar">🔊</button>
        <button class="player-btn" type="button" onclick="toggleFullscreen()" aria-label="Pantalla completa">⛶</button>
      </div>
    </div>
  </div>
</div>

<div id="vod-detail" class="vod-detail" aria-modal="true">
  <button class="vod-detail-close" type="button" onclick="closeVodDetail()">✕</button>
  <div id="vod-detail-content"></div>
</div>

<script>
  let allChannels = [];
  let grouped = {};
  let subgrouped = {};
  let customChannels = [];
  let currentView = { type: 'favorites', group: null, subgroup: null };
  let hls = null;
  let liveStateTimer = null;
  let controlsHideTimer = null;
  let streamLoadTimer = null;
  let streamLoadProgress = 0;
  let streamLoadStartedAt = 0;
  let activeChannel = null;
  let userClosedPlayer = false;
  let appMode = 'live';
  let vodLoaded = false;
  let vodHomeSections = [];
  let vodSearchTimer = null;
  let activeVodItem = null;
  const sidebarEl = document.getElementById('sidebar');
  const videoEl = document.getElementById('video');
  const vodFrameEl = document.getElementById('vod-frame');
  const playerShellEl = document.getElementById('player-shell');
  const streamLoaderEl = document.getElementById('stream-loader');
  const streamErrorEl = document.getElementById('stream-error');
  const FAVORITES_KEY = 'raspberryace:favorites:v1';
  let favoriteKeys = loadFavoriteKeys();

  function toggleSidebar() { sidebarEl.classList.toggle('open'); }

  function setAppMode(mode) {
    appMode = mode === 'vod' ? 'vod' : 'live';
    document.body.classList.toggle('vod-mode', appMode === 'vod');
    document.getElementById('live-tab').classList.toggle('active', appMode === 'live');
    document.getElementById('vod-tab').classList.toggle('active', appMode === 'vod');
    const search = document.getElementById('search');
    search.value = '';
    search.placeholder = appMode === 'vod' ? 'Buscar película o serie…' : 'Buscar canal o pegar AceStream ID…';
    document.getElementById('channel-count').textContent = appMode === 'vod' ? 'VOD legal' : `${allChannels.length} canales`;
    if (appMode === 'vod') {
      if (!vodLoaded) loadVodHome();
    } else {
      renderCurrentView();
      document.getElementById('channel-count').textContent = `${allChannels.length} canales`;
    }
  }

  async function loadVodHome() {
    const loading = document.getElementById('vod-loading');
    const error = document.getElementById('vod-error');
    const home = document.getElementById('vod-home');
    loading.style.display = 'block';
    error.style.display = 'none';
    home.style.display = 'none';

    try {
      const res = await fetch('/api/vod/home');
      const data = await res.json();
      if (!res.ok || data.error) throw new Error(data.error || `HTTP ${res.status}`);
      vodLoaded = true;
      vodHomeSections = data.sections || [];
      renderVodHome(vodHomeSections);
      loading.style.display = 'none';
      home.style.display = 'block';
      document.getElementById('channel-count').textContent = 'TMDb + trailers oficiales';
    } catch (e) {
      loading.style.display = 'none';
      error.style.display = 'block';
      document.getElementById('vod-error-msg').textContent = e.message;
      document.getElementById('channel-count').textContent = 'VOD no configurado';
    }
  }

  function renderVodHome(sections) {
    const home = document.getElementById('vod-home');
    const heroItem = sections.flatMap(section => section.items || []).find(item => item.backdrop_path) || sections[0]?.items?.[0];
    const hero = heroItem ? vodHeroHtml(heroItem) : '';
    home.innerHTML = hero + sections.map(section => `
      <section class="vod-section">
        <h3>${escHtml(section.title)}</h3>
        <div class="vod-row">${(section.items || []).map(item => vodCardHtml(item)).join('')}</div>
      </section>
    `).join('') + '<div class="tmdb-credit">Datos e imágenes proporcionados por TMDb. Reproducción limitada a trailers y clips públicos oficiales cuando estén disponibles.</div>';
  }

  function vodHeroHtml(item) {
    const bg = tmdbImage(item.backdrop_path, 'w1280');
    return `<section class="vod-hero" style="background-image:url('${escHtml(bg || '')}')">
      <div class="vod-hero-inner">
        <div class="vod-kicker">${item.media_type === 'tv' ? 'Serie' : 'Película'} destacada</div>
        <h2>${escHtml(item.title)}</h2>
        <div class="vod-meta">${vodMetaHtml(item)}</div>
        <p class="vod-overview">${escHtml(shortText(item.overview, 260) || 'Sin sinopsis disponible.')}</p>
        <button class="vod-action" type="button" onclick="openVodDetail(${jsArg(item)})">Ver trailers</button>
        <button class="vod-action secondary" type="button" onclick="openVodDetail(${jsArg(item)})">Detalles</button>
      </div>
    </section>`;
  }

  function vodCardHtml(item) {
    const poster = tmdbImage(item.poster_path, 'w342');
    const image = poster
      ? `<img class="vod-poster" src="${escHtml(poster)}" alt="" loading="lazy">`
      : `<div class="vod-poster-fallback">${escHtml(item.title)}</div>`;
    return `<button class="vod-card" type="button" onclick="openVodDetail(${jsArg(item)})">
      ${image}
      <div class="vod-card-body">
        <div class="vod-title">${escHtml(item.title)}</div>
        <div class="vod-card-meta"><span>${item.media_type === 'tv' ? 'Serie' : 'Película'} · ${escHtml(vodYear(item) || 's/f')}</span><span>${vodRating(item)}</span></div>
      </div>
    </button>`;
  }

  async function openVodDetail(item) {
    const overlay = document.getElementById('vod-detail');
    const content = document.getElementById('vod-detail-content');
    overlay.classList.add('open');
    content.innerHTML = '<div id="vod-loading"><div class="spinner"></div>Cargando detalle…</div>';

    try {
      const res = await fetch(`/api/vod/${encodeURIComponent(item.media_type)}/${encodeURIComponent(item.tmdb_id)}`);
      const detail = await res.json();
      if (!res.ok || detail.error) throw new Error(detail.error || `HTTP ${res.status}`);
      activeVodItem = detail;
      renderVodDetail(detail);
    } catch (e) {
      content.innerHTML = `<div id="vod-error">No se pudo cargar el detalle.<br><small>${escHtml(e.message)}</small></div>`;
    }
  }

  function renderVodDetail(item) {
    const content = document.getElementById('vod-detail-content');
    const bg = tmdbImage(item.backdrop_path, 'w1280');
    const videos = item.videos || [];
    const providers = item.playback?.providers || [];
    content.innerHTML = `<section class="vod-detail-hero" style="background-image:url('${escHtml(bg || '')}')">
      <div class="vod-detail-body">
        <div class="vod-kicker">${item.media_type === 'tv' ? 'Serie' : 'Película'} ${item.imdb_id ? '· IMDb ' + escHtml(item.imdb_id) : ''}</div>
        <h2>${escHtml(item.title)}</h2>
        <div class="vod-meta">${vodMetaHtml(item)}${item.runtime ? `<span>${item.runtime} min</span>` : ''}${item.number_of_seasons ? `<span>${item.number_of_seasons} temporadas</span>` : ''}</div>
        <p class="vod-overview">${escHtml(item.overview || 'Sin sinopsis disponible.')}</p>
        ${videos.length ? `<button class="vod-action" type="button" onclick="playVodVideo(${jsArg(item)}, ${jsArg(videos[0])})">Reproducir trailer</button>` : '<button class="vod-action" type="button" disabled>Sin trailer disponible</button>'}
      </div>
    </section>
    <section class="vod-trailer-list">
      <h3>Proveedor VOD legal</h3>
      <p class="vod-provider-note">${escHtml(item.playback?.message || 'Proveedor VOD legal pendiente de configurar.')}</p>
      ${item.media_type === 'tv' ? vodEpisodeSelectorHtml(item) : `<button class="vod-small-action" type="button" onclick="requestVodPlayback(${jsArg(item)})">Comprobar proveedor</button>`}
      <div id="vod-provider-results">${providers.length ? providers.map(provider => `<button class="vod-video-btn" type="button" onclick="playVodProvider(${jsArg(item)}, ${jsArg(provider)})">${escHtml(provider.name)}</button>`).join('') : ''}</div>
    </section>
    <section class="vod-trailer-list">
      <h3>Trailers y clips públicos</h3>
      ${videos.length ? videos.map(video => `<button class="vod-video-btn" type="button" onclick="playVodVideo(${jsArg(item)}, ${jsArg(video)})">${escHtml(video.type)} · ${escHtml(video.name)}</button>`).join('') : '<p class="vod-overview">TMDb no devuelve trailers o clips públicos para este título.</p>'}
    </section>
    ${item.recommendations?.length ? `<section class="vod-section"><h3>Más como esto</h3><div class="vod-row">${item.recommendations.map(vodCardHtml).join('')}</div></section>` : ''}`;

    if (item.media_type === 'tv' && item.seasons?.length) {
      loadVodSeasonEpisodes(item.tmdb_id, item.seasons[0].season_number);
    }
  }

  function vodEpisodeSelectorHtml(item) {
    const seasons = item.seasons || [];
    if (!seasons.length) return '<p class="vod-provider-note">TMDb no devuelve temporadas para esta serie.</p>';

    return `<div class="vod-episode-tools">
      <select id="vod-season-select" class="vod-select" onchange="loadVodSeasonEpisodes(${Number(item.tmdb_id)}, Number(this.value))">
        ${seasons.map(season => `<option value="${season.season_number}">Temporada ${season.season_number}</option>`).join('')}
      </select>
      <select id="vod-episode-select" class="vod-select">
        <option value="">Cargando episodios…</option>
      </select>
      <button class="vod-small-action" type="button" onclick="requestVodPlayback(${jsArg(item)})">Comprobar episodio</button>
    </div>`;
  }

  async function loadVodSeasonEpisodes(tmdbId, seasonNumber) {
    const select = document.getElementById('vod-episode-select');
    if (!select) return;
    select.innerHTML = '<option value="">Cargando episodios…</option>';

    try {
      const res = await fetch(`/api/vod/tv/${encodeURIComponent(tmdbId)}/season/${encodeURIComponent(seasonNumber)}`);
      const season = await res.json();
      if (!res.ok || season.error) throw new Error(season.error || `HTTP ${res.status}`);
      select.innerHTML = (season.episodes || []).map(episode =>
        `<option value="${episode.episode_number}">${episode.episode_number}. ${escHtml(episode.name || 'Episodio')}</option>`
      ).join('');
    } catch (e) {
      select.innerHTML = `<option value="">${escHtml(e.message)}</option>`;
    }
  }

  async function requestVodPlayback(item) {
    const results = document.getElementById('vod-provider-results');
    if (!results) return;
    results.innerHTML = '<p class="vod-provider-note">Consultando proveedor…</p>';

    const params = new URLSearchParams();
    if (item.media_type === 'tv') {
      const season = document.getElementById('vod-season-select')?.value;
      const episode = document.getElementById('vod-episode-select')?.value;
      if (!season || !episode) {
        results.innerHTML = '<p class="vod-provider-note">Selecciona temporada y episodio.</p>';
        return;
      }
      params.set('season', season);
      params.set('episode', episode);
    }

    try {
      const query = params.toString() ? `?${params.toString()}` : '';
      const res = await fetch(`/api/vod/${encodeURIComponent(item.media_type)}/${encodeURIComponent(item.tmdb_id)}/playback${query}`);
      const playback = await res.json();
      if (!res.ok || playback.error) throw new Error(playback.error || `HTTP ${res.status}`);
      const providers = playback.providers || [];
      results.innerHTML = `<p class="vod-provider-note">${escHtml(playback.message || 'Proveedor consultado.')}</p>`
        + (providers.length ? providers.map(provider => `<button class="vod-video-btn" type="button" onclick="playVodProvider(${jsArg(item)}, ${jsArg(provider)})">${escHtml(provider.name)}</button>`).join('') : '');
    } catch (e) {
      results.innerHTML = `<p class="vod-provider-note">${escHtml(e.message)}</p>`;
    }
  }

  function closeVodDetail() {
    document.getElementById('vod-detail').classList.remove('open');
    activeVodItem = null;
  }

  function playVodVideo(item, video) {
    closeVodDetail();
    activeVodItem = item;
    activeChannel = null;
    userClosedPlayer = false;
    if (hls) { hls.destroy(); hls = null; }
    videoEl.pause();
    videoEl.removeAttribute('src');
    videoEl.load();
    hideStreamLoader(true);
    hideStreamError();
    stopLiveStateTimer();
    stopControlsHideTimer();
    playerShellEl.classList.add('vod-player');
    document.getElementById('player-overlay').classList.add('open');
    document.getElementById('player-title').textContent = `${item.title} · ${video.type}`;
    document.getElementById('player-status').textContent = video.official ? 'Trailer oficial' : 'Trailer público';
    document.getElementById('player-logo').style.display = 'none';
    vodFrameEl.src = video.embed_url;
  }

  function playVodProvider(item, provider) {
    closeVodDetail();
    activeVodItem = item;
    activeChannel = null;
    userClosedPlayer = false;
    if (hls) { hls.destroy(); hls = null; }
    hideStreamLoader(true);
    hideStreamError();
    stopLiveStateTimer();
    stopControlsHideTimer();
    document.getElementById('player-overlay').classList.add('open');
    document.getElementById('player-title').textContent = `${item.title} · ${provider.name}`;
    document.getElementById('player-status').textContent = 'Proveedor VOD legal';
    document.getElementById('player-logo').style.display = 'none';

    if (provider.embed_url) {
      playerShellEl.classList.add('vod-player');
      videoEl.pause();
      videoEl.removeAttribute('src');
      videoEl.load();
      vodFrameEl.src = provider.embed_url;
      return;
    }

    playerShellEl.classList.remove('vod-player');
    vodFrameEl.src = '';
    videoEl.setAttribute('controls', '');
    videoEl.src = provider.stream_url;
    videoEl.play();
  }

  async function loadChannels() {
    try {
      const res = await fetch('/api/channels');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (data.error) throw new Error(data.error);

      allChannels = data.channels;
      grouped = data.grouped;
      subgrouped = data.subgrouped || {};
      syncCustomGroup();
      document.getElementById('channel-count').textContent = `${data.total} canales`;
      renderGroups();
      renderCurrentView();
      document.getElementById('loading-state').style.display = 'none';
      document.getElementById('content').style.display = 'block';
    } catch(e) {
      document.getElementById('loading-state').style.display = 'none';
      document.getElementById('error-state').style.display = 'block';
      document.getElementById('error-msg').textContent = e.message;
    }
  }

  function renderGroups() {
    const ul = document.getElementById('group-list');
    const favoritesCount = getFavoriteChannels().length;

    if (currentView.group && grouped[currentView.group]) {
      const group = currentView.group;
      const subgroups = Object.keys(subgrouped[group] || {});
      ul.innerHTML = viewLi('all', null, null, '← Categorías', 'back')
        + viewLi('group', group, null, `${escHtml(group)} <span style="color:#555;font-size:11px">(${grouped[group].length})</span>`)
        + '<li class="section-label">Subgrupos</li>'
        + subgroups.map(s => viewLi('subgroup', group, s, `${escHtml(s)} <span style="color:#555;font-size:11px">(${subgrouped[group][s].length})</span>`, 'subgroup')).join('');
      return;
    }

    const groups = Object.keys(grouped);
    ul.innerHTML = viewLi('favorites', null, null, `♥ Favoritos <span style="color:#555;font-size:11px">(${favoritesCount})</span>`)
      + viewLi('all', null, null, '🎬 Todos')
      + groups.map(g => viewLi('group', g, null, `${escHtml(g)} <span style="color:#555;font-size:11px">(${grouped[g].length})</span>`)).join('');
  }

  function viewLi(type, group, subgroup, label, extraClass = '') {
    const active = isCurrentView(type, group, subgroup) ? ' active' : '';
    const klass = `${active}${extraClass ? ' ' + extraClass : ''}`.trim();
    return `<li${klass ? ` class="${klass}"` : ''} onclick="selectView(${jsArg(type)}, ${jsArg(group)}, ${jsArg(subgroup)}, this)">${label}</li>`;
  }

  function isCurrentView(type, group, subgroup) {
    return currentView.type === type && currentView.group === group && currentView.subgroup === subgroup;
  }

  function selectView(type, group, subgroup, el) {
    currentView = { type, group, subgroup };
    document.querySelectorAll('#group-list li').forEach(l => l.classList.remove('active'));
    if (el) el.classList.add('active');
    if (window.innerWidth <= 640) sidebarEl.classList.remove('open');
    renderGroups();
    renderCurrentView();
  }

  function renderCurrentView() {
    const q = document.getElementById('search').value.trim();
    if (q) { onSearch(q); return; }
    const channels = getCurrentChannels();
    renderGrid(currentView, channels);
  }

  function getCurrentChannels() {
    if (currentView.type === 'favorites') return getFavoriteChannels();
    if (currentView.type === 'all') return allChannels;
    if (currentView.type === 'subgroup') return subgrouped[currentView.group]?.[currentView.subgroup] || [];
    if (currentView.type === 'group') return grouped[currentView.group] || [];
    return allChannels;
  }

  function renderGrid(view, channels) {
    const content = document.getElementById('content');
    if (!channels.length) { content.innerHTML = '<div style="color:var(--text2);padding:40px">Sin canales</div>'; return; }

    if (view.type === 'all') {
      // Render by groups
      const groups = Object.keys(grouped);
      content.innerHTML = groups.map(g => `
        <div>
          <div class="group-title">${escHtml(g)}</div>
          <div class="channel-grid">${grouped[g].map(ch => cardHtml(ch)).join('')}</div>
        </div>`).join('');
    } else if (view.type === 'favorites') {
      content.innerHTML = `<div class="group-title">Favoritos</div><div class="channel-grid">${channels.map(ch => cardHtml(ch)).join('')}</div>`;
    } else if (view.type === 'subgroup') {
      content.innerHTML = `<div class="group-title">${escHtml(view.group)} / ${escHtml(view.subgroup)}</div><div class="channel-grid">${channels.map(ch => cardHtml(ch)).join('')}</div>`;
    } else {
      content.innerHTML = `<div class="group-title">${escHtml(view.group)}</div><div class="channel-grid">${channels.map(ch => cardHtml(ch)).join('')}</div>`;
    }
  }

  function cardHtml(ch) {
    const favorite = isFavorite(ch);
    const logo = ch.logo
      ? `<img class="ch-logo" src="${escHtml(ch.logo)}" alt="" onerror="this.outerHTML='<div class=ch-logo-placeholder>📺</div>'">`
      : `<div class="ch-logo-placeholder">📺</div>`;
    return `<div class="channel-card" onclick="playChannel(${jsArg(ch)})">
      <button class="favorite-btn${favorite ? ' active' : ''}" type="button" title="${favorite ? 'Quitar de favoritos' : 'Añadir a favoritos'}" aria-label="${favorite ? 'Quitar de favoritos' : 'Añadir a favoritos'}" onclick="toggleFavorite(event, ${jsArg(ch)})">${favorite ? '♥' : '♡'}</button>
      ${logo}
      <div class="ch-name">${escHtml(ch.name)}</div>
    </div>`;
  }

  function onSearch(q) {
    if (appMode === 'vod') {
      clearTimeout(vodSearchTimer);
      vodSearchTimer = setTimeout(() => searchVod(q), 250);
      return;
    }

    const filtered = allChannels.filter(ch => ch.name.toLowerCase().includes(q.toLowerCase()));
    document.getElementById('channel-count').textContent = `${filtered.length} canales`;
    if (!q) { renderCurrentView(); return; }
    const content = document.getElementById('content');
    content.innerHTML = `<div class="group-title">Resultados: "${escHtml(q)}"</div><div class="channel-grid">${filtered.map(ch => cardHtml(ch)).join('')}</div>`;
  }

  async function searchVod(q) {
    const query = q.trim();
    const home = document.getElementById('vod-home');
    if (!query) {
      if (vodHomeSections.length) renderVodHome(vodHomeSections);
      home.style.display = vodLoaded ? 'block' : 'none';
      document.getElementById('channel-count').textContent = vodLoaded ? 'TMDb + trailers oficiales' : 'VOD legal';
      return;
    }

    home.style.display = 'block';
    home.innerHTML = `<div id="vod-loading"><div class="spinner"></div>Buscando…</div>`;
    try {
      const res = await fetch(`/api/vod/search?q=${encodeURIComponent(query)}`);
      const data = await res.json();
      if (!res.ok || data.error) throw new Error(data.error || `HTTP ${res.status}`);
      document.getElementById('channel-count').textContent = `${data.results.length} resultados`;
      home.innerHTML = `<section class="vod-section">
        <h3>Resultados: "${escHtml(query)}"</h3>
        <div class="vod-row">${data.results.map(vodCardHtml).join('')}</div>
      </section>`;
    } catch (e) {
      document.getElementById('channel-count').textContent = 'Error VOD';
      home.innerHTML = `<div id="vod-error">No se pudo buscar.<br><small>${escHtml(e.message)}</small></div>`;
    }
  }

  function onSearchKeydown(event) {
    if (appMode === 'vod') return;
    if (event.key === 'Enter' && looksLikeAceInput(event.currentTarget.value)) {
      event.preventDefault();
      loadCustomChannel();
    }
  }

  async function loadCustomChannel() {
    const input = document.getElementById('search');
    const button = document.getElementById('custom-btn');
    const rawId = input.value.trim();
    if (!rawId) return;

    button.disabled = true;
    document.getElementById('channel-count').textContent = 'Cargando canal...';

    try {
      const res = await fetch('/api/custom-channel', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: rawId })
      });
      const ch = await res.json();
      if (!res.ok || ch.error) throw new Error(ch.error || `HTTP ${res.status}`);

      const existing = customChannels.find(c => c.contentId === ch.contentId);
      if (!existing) customChannels.unshift(ch);
      syncCustomGroup();
      input.value = '';
      currentView = { type: 'group', group: 'Custom', subgroup: null };
      renderGroups();
      renderCurrentView();
      document.getElementById('channel-count').textContent = `${allChannels.length} canales`;
      playChannel(ch);
    } catch (e) {
      document.getElementById('channel-count').textContent = e.message;
    } finally {
      button.disabled = false;
    }
  }

  function syncCustomGroup() {
    const regularChannels = allChannels.filter(ch => ch.group !== 'Custom' || !ch.contentId);
    allChannels = [...customChannels, ...regularChannels];
    if (customChannels.length) {
      grouped.Custom = customChannels;
      subgrouped.Custom = { Manual: customChannels };
    } else {
      delete grouped.Custom;
      delete subgrouped.Custom;
    }
  }

  function looksLikeAceInput(value) {
    const q = value.trim();
    return /^[a-fA-F0-9]{40}$/.test(q) || /^acestream:\/\//i.test(q) || /(?:[?&](?:id|infohash)=|\/(?:content_id|pid|infohash)\/)/i.test(q);
  }

  function loadFavoriteKeys() {
    try {
      const parsed = JSON.parse(localStorage.getItem(FAVORITES_KEY) || '[]');
      const keys = new Set();
      if (Array.isArray(parsed)) {
        parsed.forEach(key => {
          const value = String(key || '');
          if (!value) return;
          keys.add(value);
          keys.add(canonicalFavoriteName(value));
        });
      }
      return keys;
    } catch {
      return new Set();
    }
  }

  function saveFavoriteKeys() {
    localStorage.setItem(FAVORITES_KEY, JSON.stringify([...favoriteKeys]));
  }

  function channelFavoriteKeys(ch) {
    const keys = new Set();
    if (ch.contentId) keys.add(`content:${ch.contentId}`);
    if (ch.tvgId) keys.add(`tvg:${String(ch.tvgId).trim().toLowerCase()}`);
    if (ch.name) {
      keys.add(canonicalFavoriteName(ch.name));
      keys.add(String(ch.name).normalize('NFKC').trim().replace(/\s+/g, ' ').toLowerCase());
    }
    return [...keys].filter(Boolean);
  }

  function canonicalFavoriteName(value) {
    return String(value || '')
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '')
      .toLowerCase()
      .replace(/\([^)]*\b(?:backup|reserva|opcion|option|source|newera|elcano|af1c1onados|misterchire|acepl)\b[^)]*\)/g, ' ')
      .replace(/\[[^\]]*\b(?:backup|reserva|opcion|option|source|newera|elcano|af1c1onados|misterchire|acepl)\b[^\]]*\]/g, ' ')
      .replace(/\b(?:uhd|fhd|qhd|hd|sd|4k|8k|1080p|720p|50fps|60fps)\b/g, ' ')
      .replace(/\b(?:backup|reserva|opcion|option|source|mirror|ace|acestream)\s*\d*\b/g, ' ')
      .replace(/\s+\(\d+\)$/g, ' ')
      .replace(/[^a-z0-9]+/g, ' ')
      .replace(/\s+/g, ' ')
      .trim();
  }

  function isFavorite(ch) {
    return channelFavoriteKeys(ch).some(key => favoriteKeys.has(key));
  }

  function getFavoriteChannels() {
    return allChannels.filter(ch => isFavorite(ch));
  }

  function toggleFavorite(event, chJson) {
    event.stopPropagation();
    const ch = chJson;
    const keys = channelFavoriteKeys(ch);
    const favorite = keys.some(key => favoriteKeys.has(key));
    keys.forEach(key => {
      if (favorite) favoriteKeys.delete(key);
      else favoriteKeys.add(key);
    });
    saveFavoriteKeys();
    renderGroups();
    renderCurrentView();
  }

  function playChannel(chJson) {
    const ch = chJson;
    activeChannel = ch;
    activeVodItem = null;
    userClosedPlayer = false;
    playerShellEl.classList.remove('vod-player');
    vodFrameEl.src = '';
    const overlay = document.getElementById('player-overlay');
    overlay.classList.add('open');
    document.getElementById('player-title').textContent = ch.name;
    document.getElementById('player-status').textContent = '⏳ Iniciando…';
    const logoEl = document.getElementById('player-logo');
    if (ch.logo) { logoEl.src = ch.logo; logoEl.style.display = ''; }
    else logoEl.style.display = 'none';

    const hlsUrl = `/stream/${encodeURIComponent(ch.streamId)}/index.m3u8`;
    if (hls) { hls.destroy(); hls = null; }
    videoEl.removeAttribute('controls');
    videoEl.muted = false;
    updateMuteButton();
    hideStreamError();
    showStreamLoader();
    startLiveStateTimer();
    showPlayerControls();

    if (Hls.isSupported()) {
      hls = new Hls({ lowLatencyMode: true });
      hls.on(Hls.Events.MANIFEST_LOADING, () => updateStreamLoader(20));
      hls.on(Hls.Events.MANIFEST_LOADED, () => updateStreamLoader(45));
      hls.on(Hls.Events.FRAG_LOADING, () => updateStreamLoader(72));
      hls.on(Hls.Events.FRAG_LOADED, () => updateStreamLoader(84));
      hls.on(Hls.Events.FRAG_BUFFERED, () => updateStreamLoader(92));
      hls.loadSource(hlsUrl);
      hls.attachMedia(videoEl);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        updateStreamLoader(65);
        goLive();
        videoEl.play();
        document.getElementById('player-status').textContent = '● En directo';
      });
      hls.on(Hls.Events.ERROR, (_, d) => {
        if (!activeChannel || activeChannel.streamId !== ch.streamId) return;
        if (d.fatal) {
          hideStreamLoader(true);
          showStreamError('El canal no ha respondido o no se ha podido abrir el manifiesto.');
          document.getElementById('player-status').textContent = '❌ ' + d.details;
        }
      });
    } else if (videoEl.canPlayType('application/vnd.apple.mpegurl')) {
      updateStreamLoader(20);
      videoEl.src = hlsUrl;
      goLive();
      videoEl.play();
    }
  }

  function closePlayer() {
    userClosedPlayer = true;
    activeChannel = null;
    activeVodItem = null;
    document.getElementById('player-overlay').classList.remove('open');
    if (hls) { hls.destroy(); hls = null; }
    stopLiveStateTimer();
    stopControlsHideTimer();
    hideStreamLoader(true);
    hideStreamError();
    playerShellEl.classList.remove('controls-hidden');
    playerShellEl.classList.remove('vod-player');
    vodFrameEl.src = '';
    videoEl.pause();
    videoEl.removeAttribute('src');
    videoEl.load();
  }

  function seekBack10() {
    if (!videoEl.seekable.length) return;
    const start = videoEl.seekable.start(0);
    videoEl.currentTime = Math.max(start, videoEl.currentTime - 10);
    updateLiveState();
    showPlayerControls();
  }

  function goLive() {
    const edge = liveEdge();
    if (edge === null) return;
    videoEl.currentTime = Math.max(0, edge - 0.5);
    videoEl.play();
    updateLiveState();
    showPlayerControls();
  }

  function liveEdge() {
    if (!videoEl.seekable.length) return null;
    return videoEl.seekable.end(videoEl.seekable.length - 1);
  }

  function updateLiveState() {
    const edge = liveEdge();
    const isLive = edge === null || edge - videoEl.currentTime < 3;
    const badge = document.getElementById('live-badge');
    const goLiveBtn = document.getElementById('go-live-btn');
    badge.hidden = !isLive;
    goLiveBtn.hidden = isLive;
  }

  function startLiveStateTimer() {
    stopLiveStateTimer();
    updateLiveState();
    liveStateTimer = setInterval(updateLiveState, 1000);
  }

  function stopLiveStateTimer() {
    if (!liveStateTimer) return;
    clearInterval(liveStateTimer);
    liveStateTimer = null;
  }

  function toggleMute() {
    videoEl.muted = !videoEl.muted;
    updateMuteButton();
    showPlayerControls();
  }

  function updateMuteButton() {
    document.getElementById('mute-btn').textContent = videoEl.muted || videoEl.volume === 0 ? '🔇' : '🔊';
  }

  function toggleFullscreen() {
    const shell = document.getElementById('player-shell');
    if (document.fullscreenElement) document.exitFullscreen();
    else if (shell.requestFullscreen) shell.requestFullscreen();
    else if (videoEl.webkitEnterFullscreen) videoEl.webkitEnterFullscreen();
    showPlayerControls();
  }

  function showPlayerControls() {
    playerShellEl.classList.remove('controls-hidden');
    stopControlsHideTimer();
    controlsHideTimer = setTimeout(() => {
      playerShellEl.classList.add('controls-hidden');
    }, 2500);
  }

  function stopControlsHideTimer() {
    if (!controlsHideTimer) return;
    clearTimeout(controlsHideTimer);
    controlsHideTimer = null;
  }

  function showStreamLoader() {
    streamLoadProgress = 0;
    streamLoadStartedAt = Date.now();
    streamLoaderEl.hidden = false;
    updateStreamLoader(8);
    stopStreamLoadTimer();
    streamLoadTimer = setInterval(() => {
      if (streamLoaderEl.hidden) return;
      const elapsed = Math.floor((Date.now() - streamLoadStartedAt) / 1000);
      if (elapsed >= 12 && streamLoadProgress < 92) {
        updateStreamLoader(streamLoadProgress);
      }
    }, 1000);
  }

  function updateStreamLoader(percent) {
    streamLoadProgress = Math.max(streamLoadProgress, Math.min(100, percent));
    document.getElementById('loader-percent').textContent = `${streamLoadProgress}%`;
  }

  function hideStreamLoader(immediate = false) {
    stopStreamLoadTimer();
    if (immediate) {
      streamLoaderEl.hidden = true;
      return;
    }
    updateStreamLoader(100);
    setTimeout(() => { streamLoaderEl.hidden = true; }, 250);
  }

  function stopStreamLoadTimer() {
    if (!streamLoadTimer) return;
    clearInterval(streamLoadTimer);
    streamLoadTimer = null;
  }

  function showStreamError(message) {
    stopStreamLoadTimer();
    streamErrorEl.hidden = false;
    document.getElementById('stream-error-msg').textContent = message;
    showPlayerControls();
  }

  function hideStreamError() {
    streamErrorEl.hidden = true;
  }

  function reloadActiveChannel() {
    if (userClosedPlayer || !activeChannel) return;
    document.getElementById('player-status').textContent = '⏳ Reconectando...';
    hideStreamError();
    showStreamLoader();
    const channel = activeChannel;
    setTimeout(() => {
      if (!userClosedPlayer && activeChannel) playChannel(channel);
    }, 600);
  }

  document.getElementById('player-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closePlayer(); });
  document.getElementById('vod-detail').addEventListener('click', e => { if (e.target === e.currentTarget) closeVodDetail(); });
  document.addEventListener('keydown', e => {
    if (e.key !== 'Escape') return;
    if (document.getElementById('vod-detail').classList.contains('open')) closeVodDetail();
    else closePlayer();
  });
  playerShellEl.addEventListener('mousemove', showPlayerControls);
  playerShellEl.addEventListener('touchstart', showPlayerControls, { passive: true });
  playerShellEl.addEventListener('click', showPlayerControls);
  videoEl.addEventListener('timeupdate', updateLiveState);
  videoEl.addEventListener('volumechange', updateMuteButton);
  videoEl.addEventListener('loadedmetadata', () => updateStreamLoader(68));
  videoEl.addEventListener('canplay', () => updateStreamLoader(95));
  videoEl.addEventListener('playing', () => hideStreamLoader());
  videoEl.addEventListener('ended', reloadActiveChannel);
  videoEl.addEventListener('error', () => {
    if (!activeChannel) return;
    hideStreamLoader(true);
    showStreamError('El reproductor no ha podido abrir este directo.');
  });
  videoEl.addEventListener('waiting', () => {
    if (!streamLoaderEl.hidden) updateStreamLoader(streamLoadProgress);
  });

  function tmdbImage(path, size) {
    return path ? `https://image.tmdb.org/t/p/${size}${path}` : null;
  }

  function vodYear(item) {
    const date = item.release_date || item.first_air_date || '';
    return date ? date.slice(0, 4) : '';
  }

  function vodRating(item) {
    const value = Number(item.vote_average || 0);
    return value > 0 ? `★ ${value.toFixed(1)}` : '★ -';
  }

  function vodMetaHtml(item) {
    return `<span>${item.media_type === 'tv' ? 'Serie' : 'Película'}</span><span>${escHtml(vodYear(item) || 'Sin fecha')}</span><span>${vodRating(item)}</span>`;
  }

  function shortText(value, max) {
    const text = String(value || '').trim();
    if (text.length <= max) return text;
    return `${text.slice(0, max - 1).trim()}…`;
  }

  function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
  function jsArg(value) { return escHtml(JSON.stringify(value)); }

  loadChannels();
</script>
</body>
</html>
